<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Cat 🐱</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Welcome Screen ─────────────────────────────────────────── -->
  <div id="welcome-screen" class="screen">
    <h1 class="welcome-title">🐱 Tiny Cat</h1>
    <p class="welcome-subtitle">Your very own virtual cat companion</p>
    <div class="welcome-form">
      <div class="form-group">
        <label for="cat-name">Name your cat</label>
        <input type="text" id="cat-name" maxlength="20" placeholder="e.g. Mochi" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Pick a fur colour</label>
        <div class="colour-picker-row">
          <input type="color" id="cat-colour" value="#f4a261">
          <span class="colour-label">Your cat's fur will be this colour</span>
        </div>
      </div>
      <button id="start-btn" class="btn btn-primary" disabled>Adopt Cat 🐾</button>
    </div>
  </div>

  <!-- ── Game Screen ────────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">

    <div class="game-header">
      <span id="cat-name-display"></span>
      <span id="state-label" class="state-label">Normal</span>
    </div>

    <div id="cat-sprite-container"></div>

    <div id="poo-area"></div>

    <div id="sick-hint" class="hidden"></div>

    <div class="stats">
      <div class="stat-row">
        <label>Hunger</label>
        <div class="stat-bar"><div id="hunger-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="hunger-val" class="stat-val">80</span>
      </div>
      <div class="stat-row">
        <label>Happiness</label>
        <div class="stat-bar"><div id="happiness-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="happiness-val" class="stat-val">80</span>
      </div>
      <div class="stat-row">
        <label>Energy</label>
        <div class="stat-bar"><div id="energy-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="energy-val" class="stat-val">80</span>
      </div>
    </div>

    <div class="actions">
      <button id="feed-btn"  class="btn btn-feed">🍽 Feed</button>
      <button id="play-btn"  class="btn btn-play">🎾 Play</button>
      <button id="rest-btn"  class="btn btn-rest">💤 Rest</button>
      <button id="pet-btn"   class="btn btn-pet hidden">🤚 Pet</button>
    </div>

    <div id="message-area"></div>

    <div class="footer-row">
      <button id="new-cat-btn" class="btn btn-ghost">New Cat</button>
    </div>

    <!-- Food panel -->
    <div id="food-panel" class="panel hidden">
      <h3>What to feed?</h3>
      <div class="panel-options">
        <button class="food-option btn" data-food="kibble">🥣 Kibble</button>
        <button class="food-option btn" data-food="tuna">🐟 Tuna</button>
        <button class="food-option btn" data-food="treats">🍗 Treats</button>
      </div>
      <button id="food-cancel">Cancel</button>
    </div>

  </div><!-- /game-screen -->

  <!-- ── Overlays ────────────────────────────────────────────────── -->

  <!-- Belly event -->
  <div id="belly-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p style="font-size:2.5rem;margin-bottom:8px">🐾</p>
      <p>Your cat is showing its belly.<br>Do you dare to pet it?</p>
      <div class="overlay-btns">
        <button id="belly-yes" class="btn btn-pet">Yes! 🤚</button>
        <button id="belly-no"  class="btn btn-ghost">No thanks</button>
      </div>
    </div>
  </div>

  <!-- Evolution -->
  <div id="evolution-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p style="font-size:2.5rem;margin-bottom:4px">✨</p>
      <h2 id="evolved-name"></h2>
      <p>They've grown up! Their needs slow down as they mature.</p>
      <button id="evolution-ok" class="btn btn-primary" style="width:100%">Amazing! 🌟</button>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p id="confirm-message"></p>
      <div class="overlay-btns">
        <button id="confirm-yes" class="btn btn-primary">Yes</button>
        <button id="confirm-no"  class="btn btn-ghost">No</button>
      </div>
    </div>
  </div>

  <script src="js/cat.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
