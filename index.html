<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TINY CAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Welcome Screen ─────────────────────────────────────────── -->
  <div id="welcome-screen" class="screen">
    <div class="welcome-header">
      <p class="welcome-eyebrow">// VIRTUAL PET SYS v1.0</p>
      <h1 class="welcome-title">TINY CAT</h1>
      <p class="welcome-subtitle">INSERT NAME TO BEGIN</p>
    </div>
    <div class="welcome-form">
      <div class="form-group">
        <label for="cat-name">CAT NAME_</label>
        <input type="text" id="cat-name" maxlength="20" placeholder="ENTER NAME" autocomplete="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label for="cat-colour">FUR COLOUR_</label>
        <input type="color" id="cat-colour" value="#f4a261">
      </div>
      <button id="start-btn" class="btn btn-primary" disabled>&#9658; START</button>
    </div>
    <button id="theme-toggle-welcome" class="btn btn-ghost theme-toggle">Light Mode</button>
  </div>

  <!-- ── Transition Screen ─────────────────────────────────────── -->
  <div id="transition-screen" class="screen hidden">
    <div class="transition-content">
      <p id="transition-name" class="transition-name"></p>
      <p class="transition-dots"><span>.</span><span>.</span><span>.</span></p>
    </div>
  </div>

  <!-- ── Game Screen ────────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">

    <div class="game-links">
      <a href="https://github.com/fonsecagabriella/tiny_cat" class="game-link" target="_blank" rel="noopener">GITHUB</a>
      
    </div>

    <div class="game-header">
      <span id="cat-name-display"></span>
      <span id="state-label" class="state-label">NORMAL</span>
    </div>

    <div id="cat-sprite-container"></div>

    <div id="poo-area"></div>

    <div id="sick-hint" class="hidden"></div>

    <div class="stats">
      <div class="stat-row">
        <label>HNG</label>
        <div class="stat-bar"><div id="hunger-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="hunger-val" class="stat-val">80</span>
      </div>
      <div class="stat-row">
        <label>HAP</label>
        <div class="stat-bar"><div id="happiness-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="happiness-val" class="stat-val">80</span>
      </div>
      <div class="stat-row">
        <label>NRG</label>
        <div class="stat-bar"><div id="energy-bar" class="bar-fill" style="width:80%"></div></div>
        <span id="energy-val" class="stat-val">80</span>
      </div>
    </div>

    <div class="actions">
      <button id="feed-btn"  class="btn btn-feed">FEED</button>
      <button id="play-btn"  class="btn btn-play">PLAY</button>
      <button id="rest-btn"  class="btn btn-rest">REST</button>
      <button id="pet-btn"   class="btn btn-pet hidden">PET</button>
    </div>

    <div id="message-area"></div>

    <div class="footer-row">
      <button id="new-cat-btn" class="btn btn-ghost">NEW GAME</button>
      <button id="theme-toggle-game" class="btn btn-ghost theme-toggle">Light Mode</button>
    </div>

    <p class="game-footer-text">created with &lt;3 and claude by <a href="https://imgabi.com" class="game-link" target="_blank" rel="noopener">imgabidotcom</a></p>

    <!-- Food panel -->
    <div id="food-panel" class="panel hidden">
      <h3>// SELECT FOOD</h3>
      <div class="panel-options">
        <button class="food-option btn" data-food="kibble">KIBBLE</button>
        <button class="food-option btn" data-food="tuna">TUNA</button>
        <button class="food-option btn" data-food="treats">TREATS</button>
      </div>
      <button id="food-cancel">[ CANCEL ]</button>
    </div>

  </div><!-- /game-screen -->

  <!-- ── Overlays ────────────────────────────────────────────────── -->

  <!-- Belly event -->
  <div id="belly-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p class="overlay-icon">~^.^~</p>
      <p>CAT IS SHOWING BELLY.<br>DO YOU DARE TO PET?</p>
      <div class="overlay-btns">
        <button id="belly-yes" class="btn btn-pet">YES</button>
        <button id="belly-no"  class="btn btn-ghost">NO</button>
      </div>
    </div>
  </div>

  <!-- Evolution -->
  <div id="evolution-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p class="overlay-icon">* * *</p>
      <h2 id="evolved-name"></h2>
      <p>EVOLVED! READY FOR WORLD DOMINATION!<br>DECAY RATE<br>HAS DECREASED.</p>
      <button id="evolution-ok" class="btn btn-primary" style="width:100%">&#9658; CONTINUE</button>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="overlay-content">
      <p id="confirm-message"></p>
      <div class="overlay-btns">
        <button id="confirm-yes" class="btn btn-primary">YES</button>
        <button id="confirm-no"  class="btn btn-ghost">NO</button>
      </div>
    </div>
  </div>

  <script src="js/cat.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
